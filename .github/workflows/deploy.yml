name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: 'npm'

      - name: Clean npm cache and reinstall dependencies
        run: |
          cd client
          rm -rf node_modules package-lock.json
          npm cache clean --force
          npm install

      - name: Build client
        run: |
          cd client
          npm run build
